name: CI

on:
  push:
  pull_request:

jobs:
  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Enforce untracked local secrets
        run: |
          if git ls-files --error-unmatch .env >/dev/null 2>&1; then
            echo "ERROR: .env must never be tracked"
            exit 1
          fi

      - name: Scan tracked files for leaked secrets
        run: |
          if git grep -nE 'hackathon-secret-key|AUp0AAIncDEyODg1YWI2Yzk0ZGY0NThlOWUyNDBjZDQxNDMwZGM2MnAxMTkwNjA|AIza[0-9A-Za-z_-]{35}|sk-[A-Za-z0-9_-]{20,}|ghp_[A-Za-z0-9]{36}|-----BEGIN (RSA|EC|OPENSSH|DSA|PGP) PRIVATE KEY-----' -- . ':!README.md' ':!docs/api_testing_guide.json' ':!docs/quickstart.md' ':!.env.example'; then
            echo "ERROR: Found prohibited secret material in tracked files"
            exit 1
          fi

      - name: Scan docs and tests for real-looking secrets
        run: |
          if git grep -nE 'AIza[0-9A-Za-z_-]{35}|sk-[A-Za-z0-9_-]{20,}|ghp_[A-Za-z0-9]{36}|-----BEGIN (RSA|EC|OPENSSH|DSA|PGP) PRIVATE KEY-----' -- docs tests '*.md' 'test_*.py'; then
            echo "ERROR: Found a secret-like value in docs or tests"
            exit 1
          fi

  test-matrix:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run core pytest suite
        env:
          REDIS_URL: ""
          GOOGLE_AI_STUDIO_KEY: ""
          API_KEY: "ci-test-key"
          ENVIRONMENT: "ci"
          PYTHONWARNINGS: error::DeprecationWarning,error::PendingDeprecationWarning
        run: |
          pytest -q tests test_step2_detectors.py test_step3_correlation.py test_policy_playbooks.py test_demo_runner.py

  smoke-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run local verification smoke check
        env:
          REDIS_URL: ""
          GOOGLE_AI_STUDIO_KEY: ""
          API_KEY: "ci-test-key"
          ENVIRONMENT: "ci"
        run: |
          python test_local.py
